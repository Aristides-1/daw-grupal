<div class="container py-4">
  <h1 class="h3 mb-1">
    {{
      esEdicion
        ? 'Editar receta'
        : 'Nueva receta'
    }}
  </h1>

  <p class="text-muted mb-4">
    Registra los medicamentos y las indicaciones médicas.
  </p>

  @if (errorMessage) {
    <div class="alert alert-danger">
      {{ errorMessage }}
    </div>
  }

  @if (isLoading) {
    <div class="text-center py-5">
      <div class="spinner-border text-primary"></div>
    </div>
  } @else {
    <div class="card shadow-sm border-0">
      <div class="card-body p-4">
        <form
          [formGroup]="formulario"
          (ngSubmit)="guardar()"
        >
          <div class="row g-3">
            <div class="col-12">
              <label class="form-label">
                Atención médica
              </label>

              <select
                class="form-select"
                formControlName="atencion"
                [class.is-invalid]="
                  campoInvalido('atencion')
                "
              >
                <option [ngValue]="0">
                  Selecciona una atención
                </option>

                @for (
                  atencion of atenciones;
                  track atencion.id
                ) {
                  <option [ngValue]="atencion.id">
                    {{ descripcionAtencion(atencion) }}
                  </option>
                }
              </select>

              <div class="invalid-feedback">
                Selecciona una atención.
              </div>
            </div>

            <div class="col-12">
              <label class="form-label">
                Medicamentos
              </label>

              <input
                type="text"
                class="form-control"
                formControlName="medicamentos"
                placeholder="Ejemplo: Omeprazol 20 mg"
                [class.is-invalid]="
                  campoInvalido('medicamentos')
                "
              />

              <div class="invalid-feedback">
                Los medicamentos son obligatorios.
              </div>
            </div>

            <div class="col-12">
              <label class="form-label">
                Indicaciones
              </label>

              <textarea
                rows="5"
                class="form-control"
                formControlName="indicaciones"
                placeholder="Dosis, frecuencia, duración y recomendaciones"
                [class.is-invalid]="
                  campoInvalido('indicaciones')
                "
              ></textarea>

              <div class="invalid-feedback">
                Las indicaciones son obligatorias.
              </div>
            </div>
          </div>

          <div
            class="d-flex justify-content-end gap-2 mt-4"
          >
            <a
              routerLink="/recetas"
              class="btn btn-outline-secondary"
            >
              Cancelar
            </a>

            <button
              type="submit"
              class="btn btn-primary"
              [disabled]="isSaving"
            >
              @if (isSaving) {
                Guardando...
              } @else {
                {{
                  esEdicion
                    ? 'Actualizar'
                    : 'Registrar'
                }}
              }
            </button>
          </div>
        </form>
      </div>
    </div>
  }
</div>
