<div class="container py-4">
  <h1 class="h3 mb-4">
    {{ esEdicion ? 'Editar veterinario' : 'Nuevo veterinario' }}
  </h1>

  @if (errorMessage) {
    <div class="alert alert-danger">
      {{ errorMessage }}
    </div>
  }

  <div class="card shadow-sm border-0">
    <div class="card-body p-4">
      <form
        [formGroup]="formulario"
        (ngSubmit)="guardar()"
      >
        <div class="row g-3">
          <div class="col-md-6">
            <label class="form-label">Nombres</label>
            <input
              class="form-control"
              formControlName="nombres"
            />
          </div>

          <div class="col-md-6">
            <label class="form-label">Apellidos</label>
            <input
              class="form-control"
              formControlName="apellidos"
            />
          </div>

          <div class="col-md-6">
            <label class="form-label">Teléfono</label>
            <input
              class="form-control"
              formControlName="telefono"
            />
          </div>

          <div class="col-md-6">
            <label class="form-label">Correo</label>
            <input
              type="email"
              class="form-control"
              formControlName="correo"
            />
          </div>

          <div class="col-12">
            <label class="form-label">Especialidad</label>

            <select
              class="form-select"
              formControlName="especialidad"
            >
              <option [ngValue]="null">
                Sin especialidad
              </option>

              @for (
                especialidad of especialidades;
                track especialidad.id
              ) {
                <option [ngValue]="especialidad.id">
                  {{ especialidad.nombre }}
                </option>
              }
            </select>
          </div>
        </div>

        <div class="d-flex justify-content-end gap-2 mt-4">
          <a
            routerLink="/veterinarios"
            class="btn btn-outline-secondary"
          >
            Cancelar
          </a>

          <button
            type="submit"
            class="btn btn-primary"
            [disabled]="isSaving"
          >
            {{ esEdicion ? 'Actualizar' : 'Registrar' }}
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
