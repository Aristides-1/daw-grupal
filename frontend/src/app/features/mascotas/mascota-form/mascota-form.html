<div class="container py-4">
  <h1 class="h3 mb-1">
    {{ esEdicion ? 'Editar mascota' : 'Nueva mascota' }}
  </h1>

  <p class="text-muted mb-4">
    Registra la información general del paciente.
  </p>

  @if (errorMessage) {
    <div class="alert alert-danger">
      {{ errorMessage }}
    </div>
  }

  @if (isLoading) {
    <div class="text-center py-5">
      <div class="spinner-border text-primary"></div>
    </div>
  } @else {
    <div class="card shadow-sm border-0">
      <div class="card-body p-4">
        <form
          [formGroup]="formulario"
          (ngSubmit)="guardar()"
        >
          <div class="row g-3">
            <div class="col-md-6">
              <label class="form-label">
                Nombre
              </label>

              <input
                class="form-control"
                formControlName="nombre"
                [class.is-invalid]="campoInvalido('nombre')"
              />

              <div class="invalid-feedback">
                El nombre es obligatorio.
              </div>
            </div>

            <div class="col-md-6">
              <label class="form-label">
                Propietario
              </label>

              <select
                class="form-select"
                formControlName="cliente"
                [class.is-invalid]="campoInvalido('cliente')"
              >
                <option [ngValue]="0">
                  Selecciona un propietario
                </option>

                @for (
                  cliente of clientes;
                  track cliente.id
                ) {
                  <option [ngValue]="cliente.id">
                    {{ cliente.nombres }}
                    {{ cliente.apellidos }}
                  </option>
                }
              </select>

              <div class="invalid-feedback">
                Selecciona un propietario.
              </div>
            </div>

            <div class="col-md-6">
              <label class="form-label">
                Especie
              </label>

              <select
                class="form-select"
                formControlName="especie"
              >
                <option value="">
                  Selecciona una especie
                </option>
                <option value="Canino">Canino</option>
                <option value="Felino">Felino</option>
                <option value="Ave">Ave</option>
                <option value="Conejo">Conejo</option>
                <option value="Otro">Otro</option>
              </select>
            </div>

            <div class="col-md-6">
              <label class="form-label">
                Raza
              </label>

              <input
                class="form-control"
                formControlName="raza"
                [class.is-invalid]="campoInvalido('raza')"
              />
            </div>

            <div class="col-md-4">
              <label class="form-label">
                Sexo
              </label>

              <select
                class="form-select"
                formControlName="sexo"
              >
                <option value="M">Macho</option>
                <option value="F">Hembra</option>
              </select>
            </div>

            <div class="col-md-4">
              <label class="form-label">
                Fecha de nacimiento
              </label>

              <input
                type="date"
                class="form-control"
                formControlName="fecha_nacimiento"
              />
            </div>

            <div class="col-md-4">
              <label class="form-label">
                Peso (kg)
              </label>

              <input
                type="number"
                step="0.01"
                min="0.01"
                class="form-control"
                formControlName="peso"
                [class.is-invalid]="campoInvalido('peso')"
              />

              <div class="invalid-feedback">
                Ingresa un peso mayor que cero.
              </div>
            </div>
          </div>

          <div
            class="d-flex justify-content-end gap-2 mt-4"
          >
            <a
              routerLink="/mascotas"
              class="btn btn-outline-secondary"
            >
              Cancelar
            </a>

            <button
              type="submit"
              class="btn btn-primary"
              [disabled]="isSaving"
            >
              @if (isSaving) {
                Guardando...
              } @else {
                {{
                  esEdicion
                    ? 'Actualizar'
                    : 'Registrar'
                }}
              }
            </button>
          </div>
        </form>
      </div>
    </div>
  }
</div>
